spring.application.name=LumiRoom

# DB 연동 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ssafy_proj1?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=비밀번호

# 스프링 배치 설정
# 애플리케이션 시작 시 Batch 메타데이터 테이블(BATCH_JOB_INSTANCE 등)이 없으면 자동 생성
spring.batch.jdbc.initialize-schema=always
# 서버가 켜질 때 Job이 제멋대로 자동 실행되는 것을 막아줍니다. (스케줄러나 수동으로만 실행하도록 설정)
spring.batch.job.enabled=false

# MyBatis 설정
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 로깅 설정(선택)
logging.level.org.springframework.batch=INFO
logging.level.com.ssafy.LumiRoom.batch.mapper=DEBUG

# 공공데이터 API 설정
# 보안등
openapi.security-light.base-url=https://www.safetydata.go.kr/V2/api/DSSP-IF-00083
openapi.security-light.service-key=보안등_서비스키
# 가로등
openapi.street-light.base-url=https://www.safetydata.go.kr/V2/api/DSSP-IF-00084
openapi.street-light.service-key=가로등_서비스키